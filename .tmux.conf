# Use control-a for the prefix
unbind C-b
set -g prefix C-a

# Highlight activity in the status line
setw -g monitor-activity on
set -g visual-activity on
set-window-option -g window-status-current-bg yellow

# Allow for mouse clicks
setw -g mode-mouse on

# Copy these environment variables to the session
set -g update-environment "SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION"

# Use vim-style navigation between panes
setw -g mode-keys vi # I especially like being able to search with /,? when in copy-mode
unbind-key j
bind-key j select-pane -D
unbind-key k
bind-key k select-pane -U
unbind-key h
bind-key h select-pane -L
unbind-key l
bind-key l select-pane -R

# Go to last window
unbind-key o
bind-key o last-window

# Reload of config file
unbind r
bind r source-file ~/.tmux.conf

# Load layout with three panes
bind D source-file ~/.tmux/dev

set -g update-environment -r

set -g default-terminal "xterm"

#### COLOUR (Solarized 256)

# default statusbar colors */
set-option -g status-bg colour235 #base02 */
set-option -g status-fg colour136 #yellow */
set-option -g status-attr default
#
## default window title colors
set-window-option -g window-status-fg colour244 #base0
set-window-option -g window-status-bg default
set-window-option -g window-status-attr dim
#
## active window title colors
set-window-option -g window-status-current-fg colour166 #orange
set-window-option -g window-status-current-bg default
#set-window-option -g window-status-current-attr bright
#
## pane border
set-option -g pane-border-fg colour235 #base02
set-option -g pane-active-border-fg colour240 #base01
#
## message text
set-option -g message-bg colour235 #base02
set-option -g message-fg colour166 #orange
#
## pane number display
set-option -g display-panes-active-colour colour33 #blue
set-option -g display-panes-colour colour166 #orange
#
## clock
set-window-option -g clock-mode-colour colour64 #green
